site_name: cspilot
site_author: Sandip Giri
site_description: >-
  Computational chemistry structure workflows and AGAPI-backed tool execution.
nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Configuration: configuration.md
      - CLI Usage: cli_usage.md
      - Examples: examples.md
  - Capabilities:
      - Agent Usage: agent_usage.md
      - Workflows: workflows.md
      - Tools: tools.md
      - AGAPI Integration: agapi.md
      - Safety: safety.md
  - Project:
      - Development: development.md
      - Roadmap: roadmap.md
      - Updating Documentation: updating_docs.md
  - Code Documentation: reference/SUMMARY.md

repo_url: https://github.com/sandipgiri576/cspilot/
edit_uri: blob/main/docs/

theme:
  features:
    - content.action.edit
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.path
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - header.autohide
    - toc.follow
  name: material
  palette:
    primary: orange
    scheme: slate

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.snippets
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format ""
          name: mermaid
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            show_source: true
            docstring_style: google
